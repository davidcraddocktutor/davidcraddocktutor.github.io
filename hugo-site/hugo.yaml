baseURL: "https://davidcraddocktutor.github.io"
title: DavidCraddockTutor.com
copyright: "© David Paul Craddock"
theme: PaperMod-dpc

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: true
buildExpired: true
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

minify:
  disableXML: true
  minifyOutput: true

languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Search
          url: search/
          weight: 10
        - name: My Experience
          url: /my-experience
          weight: 11
        - name: How I Work
          url: /how-i-work
          weight: 12
        - name: Get in Contact
          url: /get-in-contact
          weight: 13
        - name: More
          url: https://davidcraddock.net
          weight: 14

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  author: David Craddock
  env: production # to enable google analytics, opengraph, x-cards and schema.
  description: "DavidCraddockTutor.com"
  defaultTheme: auto
  # disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  TocOpen: true # open contents automantically
  comments: true
  pagerSize: 5
  images: ["/mugshot.png"]

  profileMode:
    enabled: false

    buttons:
      - name: Archives
        url: archives
      - name: Tags
        url: tags

  homeInfoParams:
    Title: "Computing Tutoring/Freelance Work"

    Content: >
      Hi, I'm David. This is my professional tutoring/freelance site where I describe what I can help you with.

      Feel free to [check out my experience](/my-experience), find out [how I work](/how-i-work) and [get in contact with me](/get-in-contact).

      References and [testimonials](https://wordswords.github.io/dpc-resume/CV.html) are available on request. I am also fully [DBS-checked](https://en.wikipedia.org/wiki/Disclosure_and_Barring_Service)

      <hr />
      <img loading="lazy" src="/impressive.png" alt="An impressive picture of my studio setup">

  socialIcons:
    - name: My Professional CV
      title: My Professional CV
      url: "https://wordswords.github.io/dpc-resume/CV.pdf"

  assets:
    disableHLJS: true
    disableFingerprinting: true

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
    linkFullImages: true

markup:
  goldmark:
    renderer:
      unsafe: true

  highlight:
    noClasses: false
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai

services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true
